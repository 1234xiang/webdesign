services:
  - type: web
    name: exam-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: FLASK_DEBUG
        value: "0"
      - key: DB_PATH
        value: /opt/render/project/src/data/exam_system.db
